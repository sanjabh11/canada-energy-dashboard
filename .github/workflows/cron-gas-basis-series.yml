name: Gas Basis Series Cron

on:
  schedule:
    - cron: '40 3 * * *'
  workflow_dispatch:

jobs:
  trigger-gas-basis-series:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gas Basis Series Ingestion
        run: |
          echo "Triggering gas basis series ingestion..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "https://qnymbecjgeaoxsfphrti.functions.supabase.co/ingest-gas-basis-series" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "x-supabase-cron: true" \
            -H "Content-Type: application/json" \
            -d '{"days":730}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Gas basis series ingestion returned HTTP $HTTP_CODE"
          fi
