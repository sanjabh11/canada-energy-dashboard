name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Supabase migrations
        run: node scripts/verify-supabase-migrations.mjs

      - name: Type check
        run: pnpm exec tsc -b

      - name: Build
        run: pnpm exec vite build

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Phase 0 smoke tests
        run: pnpm exec playwright test tests/component/foundation-phase0.spec.ts --project=chromium
