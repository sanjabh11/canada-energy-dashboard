name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level moderate || true

      - name: Semgrep SAST scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
          auditOn: never

      - name: Verify Supabase migrations
        run: node scripts/verify-supabase-migrations.mjs

      - name: Check placeholder model-weight deadline
        run: node scripts/check-placeholder-weight-deadline.mjs

      - name: Type check
        run: pnpm exec tsc -b

      - name: Claim-boundary guardrails
        run: pnpm run check:claim-boundaries

      - name: Commercial source-of-truth guardrails
        run: pnpm run check:commercial-source

      - name: Repository hygiene guardrails
        run: pnpm run check:repo-hygiene

      - name: Client environment safety guardrails
        run: pnpm run check:client-env-safety

      - name: GitHub repository metadata guardrails
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm run check:github-repo-metadata

      - name: Public source metadata guardrails
        run: pnpm run check:public-metadata

      - name: Pilot evidence register guardrails
        run: pnpm run check:pilot-evidence-template

      - name: Pilot evidence 95 fixture gate
        run: pnpm run check:pilot-evidence-95-fixture-gate

      - name: Positioning audit verifier
        run: pnpm run check:positioning-audit

  test:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm exec vitest run

  build-and-smoke:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec vite build

      - name: Proof-pack bundle budgets
        run: pnpm run check:proof-pack-bundles

      - name: Public build metadata guardrails
        run: pnpm run check:public-metadata -- --dist

      - name: Pilot evidence register sample validation
        run: pnpm run validate:pilot-evidence -- docs/growth/templates/PILOT_EVIDENCE_REGISTER_TEMPLATE.csv --allow-template

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Phase 0 smoke tests
        run: pnpm exec playwright test tests/component/foundation-phase0.spec.ts --project=chromium

      - name: Phase 6 proof-pack browser smoke tests
        env:
          PLAYWRIGHT_PHASE6_PORT: 4199
          TEST_BASE_URL: http://127.0.0.1:4199
          PLAYWRIGHT_WEBSERVER_COMMAND: pnpm exec vite preview --host 127.0.0.1 --port 4199 --strictPort
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-phase6
          PLAYWRIGHT_JSON_OUTPUT_FILE: playwright-results-phase6.json
        run: pnpm run test:browser:phase6
