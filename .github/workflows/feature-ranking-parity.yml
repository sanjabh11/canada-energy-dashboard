name: Feature Ranking Parity Benchmark

on:
  workflow_dispatch:

jobs:
  feature-ranking-parity:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r training/requirements.txt

      - name: Build canonical dataset and TypeScript benchmark
        run: |
          npx tsx scripts/feature-ranking-benchmark.ts \
            --dataset-out artifacts/feature-ranking-benchmark/dataset.json \
            --ts-out artifacts/feature-ranking-benchmark/ts-result.json \
            --seed 42

      - name: Run aligned parity reference
        run: |
          python scripts/feature-ranking-reference.py \
            --dataset artifacts/feature-ranking-benchmark/dataset.json \
            --out artifacts/feature-ranking-benchmark/parity-reference-result.json \
            --seed 42

      - name: Run sklearn baseline reference
        run: |
          python scripts/feature-ranking-baseline.py \
            --dataset artifacts/feature-ranking-benchmark/dataset.json \
            --out artifacts/feature-ranking-benchmark/baseline-reference-result.json \
            --seed 42

      - name: Merge parity artifact and enforce overlap floor
        run: |
          npx tsx scripts/feature-ranking-parity-merge.ts \
            --dataset artifacts/feature-ranking-benchmark/dataset.json \
            --ts artifacts/feature-ranking-benchmark/ts-result.json \
            --reference artifacts/feature-ranking-benchmark/parity-reference-result.json \
            --out artifacts/feature-ranking-benchmark/parity-artifact.json \
            --overlap-floor 0.75

      - name: Upload parity artifacts
        uses: actions/upload-artifact@v4
        with:
          name: feature-ranking-parity-${{ github.run_number }}
          path: artifacts/feature-ranking-benchmark
          if-no-files-found: error
