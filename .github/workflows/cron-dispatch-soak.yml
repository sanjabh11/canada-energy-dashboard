name: Dispatch Trained-Path Soak

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  dispatch-soak:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dispatch trained-path soak
        run: |
          pnpm exec vitest run tests/unit/dispatchSoak.test.ts
