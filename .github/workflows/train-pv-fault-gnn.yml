name: Train PV Fault GNN

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  bootstrap-pv-fault-gnn:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r training/requirements.txt

      - name: Prepare output directories
        run: |
          mkdir -p training/pv_fault_gnn/out

      - name: Generate simulator-calibrated scenarios
        run: |
          python -m training.pv_fault_gnn.generate_scenarios \
            --out training/pv_fault_gnn/out/scenarios.jsonl \
            --manifest training/pv_fault_gnn/out/manifest.json \
            --count 20000 \
            --seed 42

      - name: Train simulator-calibrated weights
        run: |
          python -m training.pv_fault_gnn.train \
            --input training/pv_fault_gnn/out/scenarios.jsonl \
            --out-weights src/lib/modelWeights/pv-gnn-v2.json \
            --out-metrics training/pv_fault_gnn/out/metrics.json \
            --count 20000 \
            --seed 42

      - name: Evaluate simulator-calibrated weights
        run: |
          python -m training.pv_fault_gnn.eval \
            --weights src/lib/modelWeights/pv-gnn-v2.json \
            --input training/pv_fault_gnn/out/scenarios.jsonl \
            --out-report training/pv_fault_gnn/out/eval.json \
            --seed 42

      - name: Publish artifact ledger entry
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GIT_COMMIT_SHA: ${{ github.sha }}
        run: |
          node scripts/record-artifact.mjs --weights src/lib/modelWeights/pv-gnn-v2.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pv-gnn-bootstrap-${{ github.run_number }}
          path: |
            src/lib/modelWeights/pv-gnn-v2.json
            training/pv_fault_gnn/out
          if-no-files-found: error
