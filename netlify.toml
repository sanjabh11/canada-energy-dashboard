# Netlify Configuration for Canada Energy Intelligence Platform
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command
  command = "pnpm run build:prod"
  
  # Publish directory (where built files are)
  publish = "dist"
  
  # Node version and cache bust
  # CRITICAL: Vite replaces import.meta.env.VITE_* at BUILD time
  # These variables MUST be present during Netlify build for streaming to work
  [build.environment]
    NODE_VERSION = "20"
    CACHE_BUSTER = "2026-02-08-security-hardening"
    # IMPORTANT: Set these in Netlify Dashboard > Site Settings > Environment Variables:
    #   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_SUPABASE_EDGE_BASE
    # Do NOT hardcode credentials in this file (it's committed to git).
    VITE_USE_STREAMING_DATASETS = "true"
    VITE_ENABLE_EDGE_FETCH = "true"
    VITE_ENABLE_LIVE_STREAMING = "true"

[build.processing]
  # Skip processing - we handle it ourselves
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# Redirects and rewrites
# Static files should be served directly (before SPA fallback)
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth-session/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*.yaml"
  to = "/:splat.yaml"
  status = 200
  force = true

[[redirects]]
  from = "/*.json"
  to = "/:splat.json"
  status = 200
  force = true

[[redirects]]
  # SPA fallback - all routes go to index.html
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy - Hardened (Whop/Paddle compatible)
    # NOTE: 'unsafe-eval' is required by @paddle/paddle-js SDK. Remove when Paddle supports strict CSP.
    # NOTE: 'unsafe-inline' in style-src is required by React inline styles (standard for React SPAs).
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-eval' https://cdn.paddle.com https://esm.sh https://cdn.jsdelivr.net https://whop.com https://static.cloudflareinsights.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      img-src 'self' data: https: blob:;
      font-src 'self' data: https://fonts.gstatic.com;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://generativelanguage.googleapis.com https://api.openweathermap.org https://weather.gc.ca https://api.whop.com https://*.whop.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.paddle.com;
      frame-ancestors 'self' https://whop.com https://*.whop.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self' https://whop.com;
    """
    
    # X-Frame-Options removed: 'ALLOW-FROM' is deprecated and ignored by modern browsers.
    # frame-ancestors in CSP above handles iframe restrictions.
    
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # X-XSS-Protection removed: deprecated header that can introduce XSS in older IE.
    # CSP is the modern replacement.
    
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permissions policy
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()"
    
    # HSTS - Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Cache control for static assets
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Don't cache HTML
    Cache-Control = "no-cache, no-store, must-revalidate"
    
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    
[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"

[[headers]]
  for = "/api/*.yaml"
  [headers.values]
    Content-Type = "application/x-yaml; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.yaml"
  [headers.values]
    Content-Type = "application/x-yaml; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
    
# Plugin configuration
[[plugins]]
  package = "@netlify/plugin-lighthouse"
  
  [[plugins.inputs.audits]]
    path = "/"
    
  [[plugins.inputs.audits.thresholds]]
    performance = 0.8
    accessibility = 0.9
    best-practices = 0.9
    seo = 0.9

# Deploy contexts
[context.production]
  command = "pnpm run build:prod"
  
[context.deploy-preview]
  command = "pnpm run build"
  
[context.branch-deploy]
  command = "pnpm run build"

# Dev server settings (for netlify dev)
[dev]
  command = "pnpm run dev"
  port = 5173
  targetPort = 5173
  publish = "dist"
  autoLaunch = false
